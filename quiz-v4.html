<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RupeeHunter v4 — Jeopardy Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{
    --pink:#FF6B9D;--pink-light:#FF9EC6;--blue:#4ECDC4;--blue-light:#45B7D1;
    --violet:#7B68EE;--bg:#0a0a1a;--glass:rgba(255,255,255,0.08);
    --glass-border:rgba(255,255,255,0.15);--text:#f0f0ff;
  }
  html,body{height:100%;overflow:hidden}
  body{
    font-family:'Rajdhani',sans-serif;background:var(--bg);color:var(--text);
    display:flex;flex-direction:column;align-items:center;position:relative;
  }
  canvas#bg{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0}

  .glass{
    background:var(--glass);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
    border:1px solid var(--glass-border);border-radius:16px;
  }

  header{
    position:relative;z-index:2;text-align:center;padding:18px 0 10px;width:100%;
  }
  header h1{
    font-size:clamp(1.4rem,3vw,2.2rem);font-weight:700;
    background:linear-gradient(135deg,var(--pink),var(--violet),var(--blue));
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;
    letter-spacing:2px;text-transform:uppercase;
  }
  .score-bar{
    display:flex;justify-content:center;gap:28px;margin-top:6px;font-size:1rem;
    font-weight:600;letter-spacing:1px;opacity:0.85;
  }
  .score-bar span{display:flex;align-items:center;gap:6px}
  .score-val{color:var(--pink-light);font-size:1.15rem}
  .q-counter{color:var(--blue-light)}

  #board{
    position:relative;z-index:2;
    display:grid;grid-template-columns:repeat(6,1fr);gap:8px;
    padding:10px 14px;width:min(96vw,960px);flex:1;
    max-height:calc(100vh - 130px);
  }
  .cat-header{
    text-align:center;font-weight:700;font-size:clamp(0.62rem,1.3vw,0.88rem);
    padding:8px 4px;border-radius:12px;
    background:linear-gradient(135deg,rgba(123,104,238,0.25),rgba(78,205,196,0.18));
    border:1px solid var(--glass-border);letter-spacing:0.5px;
    line-height:1.2;display:flex;align-items:center;justify-content:center;
  }
  .cell{
    text-align:center;font-weight:700;font-size:clamp(1rem,2vw,1.5rem);
    padding:6px;border-radius:14px;cursor:pointer;
    background:linear-gradient(145deg,rgba(255,107,157,0.15),rgba(78,205,196,0.12));
    border:1px solid var(--glass-border);
    display:flex;align-items:center;justify-content:center;
    transition:all .25s ease;color:var(--pink-light);min-height:0;
  }
  .cell:hover{
    background:linear-gradient(145deg,rgba(255,107,157,0.3),rgba(78,205,196,0.25));
    border-color:var(--pink);transform:scale(1.04);
    box-shadow:0 0 20px rgba(255,107,157,0.2);
  }
  .cell.done{
    opacity:0.2;cursor:default;pointer-events:none;
    background:rgba(255,255,255,0.03);border-color:transparent;
  }

  #overlay{
    display:none;position:fixed;inset:0;z-index:10;
    background:rgba(0,0,0,0.65);backdrop-filter:blur(6px);
    align-items:center;justify-content:center;padding:20px;
  }
  #overlay.active{display:flex}
  #modal{
    width:min(92vw,620px);padding:32px 28px;border-radius:22px;
    background:linear-gradient(160deg,rgba(20,14,40,0.92),rgba(10,10,30,0.95));
    border:1px solid var(--glass-border);
    box-shadow:0 0 60px rgba(123,104,238,0.15),0 0 120px rgba(255,107,157,0.08);
    text-align:center;animation:modalIn .35s ease;
  }
  @keyframes modalIn{from{opacity:0;transform:scale(0.9) translateY(20px)}to{opacity:1;transform:none}}
  #modal .cat-label{
    font-size:0.85rem;font-weight:600;letter-spacing:2px;text-transform:uppercase;
    color:var(--blue);margin-bottom:4px;
  }
  #modal .value-label{
    font-size:1.6rem;font-weight:700;color:var(--pink);margin-bottom:16px;
  }
  #modal .question{
    font-size:clamp(1rem,2.5vw,1.3rem);font-weight:500;line-height:1.5;
    margin-bottom:24px;min-height:60px;
  }
  #modal .question code{
    background:rgba(123,104,238,0.25);padding:1px 7px;border-radius:6px;
    font-family:'Rajdhani',monospace;font-size:0.95em;color:var(--pink-light);
  }

  .choices{display:flex;flex-direction:column;gap:10px;margin-bottom:10px}
  .choice-btn{
    width:100%;padding:13px 18px;border-radius:12px;border:1px solid var(--glass-border);
    background:var(--glass);color:var(--text);font-family:'Rajdhani',sans-serif;
    font-size:1rem;font-weight:500;cursor:pointer;text-align:left;
    transition:all .2s ease;line-height:1.35;
  }
  .choice-btn:hover{
    background:rgba(255,107,157,0.15);border-color:var(--pink);
    box-shadow:0 0 14px rgba(255,107,157,0.12);
  }
  .choice-btn.correct{
    background:rgba(78,205,196,0.25)!important;border-color:var(--blue)!important;
    color:#fff!important;
  }
  .choice-btn.wrong{
    background:rgba(255,80,80,0.25)!important;border-color:#ff5050!important;
    color:#ffaaaa!important;
  }
  .choice-btn.reveal{
    border-color:var(--blue)!important;background:rgba(78,205,196,0.12)!important;
  }
  .choice-btn:disabled{cursor:default;opacity:0.7}

  #feedback{
    margin-top:14px;font-size:1rem;font-weight:600;min-height:28px;
    transition:opacity .3s;
  }
  #feedback.green{color:var(--blue)}
  #feedback.red{color:#ff7070}

  #next-btn{
    margin-top:16px;padding:10px 36px;border-radius:12px;border:none;
    background:linear-gradient(135deg,var(--pink),var(--violet));
    color:#fff;font-family:'Rajdhani',sans-serif;font-size:1.05rem;
    font-weight:700;cursor:pointer;letter-spacing:1px;
    transition:all .2s;display:none;
  }
  #next-btn:hover{transform:scale(1.04);box-shadow:0 0 24px rgba(255,107,157,0.3)}

  #final{
    display:none;position:fixed;inset:0;z-index:20;
    background:rgba(0,0,0,0.75);backdrop-filter:blur(10px);
    align-items:center;justify-content:center;padding:20px;
  }
  #final.active{display:flex}
  #final-card{
    width:min(92vw,520px);padding:40px 32px;border-radius:24px;
    background:linear-gradient(160deg,rgba(20,14,40,0.95),rgba(10,10,30,0.97));
    border:1px solid var(--glass-border);text-align:center;
    box-shadow:0 0 80px rgba(123,104,238,0.2);animation:modalIn .5s ease;
  }
  #final-card h2{
    font-size:2rem;font-weight:700;
    background:linear-gradient(135deg,var(--pink),var(--blue));
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;
    margin-bottom:12px;
  }
  #final-card .final-score{font-size:3rem;font-weight:700;color:var(--pink-light);margin:10px 0}
  #final-card .final-sub{font-size:1.1rem;opacity:0.7;margin-bottom:8px}
  #final-card .final-rank{
    font-size:1.3rem;font-weight:700;margin:16px 0;padding:12px;
    border-radius:14px;background:rgba(123,104,238,0.15);
  }
  #final-card .breakdown{text-align:left;margin:16px 0;font-size:0.92rem;line-height:1.8;opacity:0.8}
  #replay-btn{
    margin-top:18px;padding:12px 40px;border-radius:14px;border:none;
    background:linear-gradient(135deg,var(--blue),var(--violet));
    color:#fff;font-family:'Rajdhani',sans-serif;font-size:1.1rem;
    font-weight:700;cursor:pointer;letter-spacing:1px;transition:all .2s;
  }
  #replay-btn:hover{transform:scale(1.05);box-shadow:0 0 30px rgba(78,205,196,0.3)}
</style>
</head>
<body>
<canvas id="bg"></canvas>

<header>
  <h1>RupeeHunter v4 — Jeopardy</h1>
  <div class="score-bar">
    <span>Score : <span class="score-val" id="score-display">$0</span></span>
    <span>Questions : <span class="q-counter" id="q-counter">0/30</span></span>
  </div>
</header>

<div id="board"></div>

<div id="overlay">
  <div id="modal" class="glass">
    <div class="cat-label" id="m-cat"></div>
    <div class="value-label" id="m-val"></div>
    <div class="question" id="m-question"></div>
    <div class="choices" id="m-choices"></div>
    <div id="feedback"></div>
    <button id="next-btn">Continuer</button>
  </div>
</div>

<div id="final">
  <div id="final-card">
    <h2>Quiz Termine !</h2>
    <div class="final-score" id="final-score"></div>
    <div class="final-sub" id="final-sub"></div>
    <div class="final-rank" id="final-rank"></div>
    <div class="breakdown" id="breakdown"></div>
    <button id="replay-btn">Rejouer</button>
  </div>
</div>

<script>
// ====================== QUIZ DATA ======================
const CATEGORIES = [
  "Edge Detection",
  "News Intelligence",
  "Signal & Grades",
  "Kelly Sizing",
  "Pipeline v4",
  "Bug Hunters"
];

const QUESTIONS = [
  // ---- EDGE DETECTION ----
  {cat:0,val:200,
   q:"Quel poids a le signal news dans compute_edge() quand Navi n'est PAS disponible ?",
   choices:["25%","35%","45%","55%"],answer:2,
   explain:"Sans Navi : News 45%, Scanner 35%, MAPEM 20%."},
  {cat:0,val:400,
   q:"Quels sont les deux criteres pour obtenir un Grade B ?",
   choices:["|edge| > 0.10 et confidence > 0.5","|edge| > 0.15 et confidence > 0.7","|edge| > 0.05 et confidence > 0.3","|edge| > 0.20 et confidence > 0.6"],answer:0,
   explain:"Grade B = |edge| > 0.10 AND confidence > 0.5."},
  {cat:0,val:600,
   q:"Quel bonus de convergence est ajoute quand Navi est present ?",
   choices:["+0.05","+0.1","+0.15","+0.2"],answer:3,
   explain:"Navi ajoute +0.2 a la convergence de base."},
  {cat:0,val:800,
   q:"Quand la direction est CONFIRMS_YES, comment l'adjustment est-il calcule ?",
   choices:[
     "strength * market_price * 0.5",
     "strength * (1.0 - market_price) * 0.5",
     "strength * avg_sentiment * 0.1",
     "strength * (1.0 - market_price) * 0.25"
   ],answer:1,
   explain:"CONFIRMS_YES pousse vers 1.0 : adjustment = strength * (1.0 - market_price) * 0.5."},
  {cat:0,val:1000,
   q:"Avec Navi disponible, quels sont les 4 poids de probabilite dans compute_edge() ?",
   choices:[
     "Navi 50%, News 25%, Scanner 15%, MAPEM 10%",
     "Navi 40%, News 30%, Scanner 20%, MAPEM 10%",
     "Navi 60%, News 20%, Scanner 10%, MAPEM 10%",
     "Navi 45%, News 25%, Scanner 20%, MAPEM 10%"
   ],answer:0,
   explain:"Navi 50%, News 25%, Scanner 15%, MAPEM 10% = weighted probability composition."},

  // ---- NEWS INTELLIGENCE ----
  {cat:1,val:200,
   q:"Combien de temps dure le cache des articles news ?",
   choices:["5 minutes","10 minutes","15 minutes","30 minutes"],answer:2,
   explain:"_NEWS_CACHE_TTL = 900 secondes = 15 minutes."},
  {cat:1,val:400,
   q:"Quel ratio declenche un signal_direction = CONFIRMS_YES ?",
   choices:[
     "yes_score > no_score",
     "yes_score > no_score * 1.5",
     "yes_score > no_score * 2.0",
     "yes_score >= no_score + 5"
   ],answer:1,
   explain:"CONFIRMS_YES si yes_score > no_score * 1.5."},
  {cat:1,val:600,
   q:"Comment est definie la velocity dans le news intel ?",
   choices:[
     "Nombre total d'articles en 24h",
     "Nombre d'articles T1 de moins de 2 heures",
     "Nombre d'articles T1 + T2 de moins de 1 heure",
     "Ratio articles recents / articles anciens"
   ],answer:1,
   explain:"velocity = nombre d'articles Tier 1 avec age_h <= 2.0 heures."},
  {cat:1,val:800,
   q:"Quel multiplicateur de velocity est applique quand >= 5 articles T1 arrivent en 2h ?",
   choices:["x1.0","x1.5","x2.0","x3.0"],answer:2,
   explain:"Velocity multiplier : >= 5 T1 en 2h = x2.0, >= 3 = x1.5, sinon x1.0."},
  {cat:1,val:1000,
   q:"Comment le signal_strength final est-il cappe ?",
   choices:[
     "min(1.0, raw_strength / 10.0)",
     "min(1.0, raw_strength / 15.0)",
     "min(1.0, raw_strength / 20.0)",
     "sigmoid(raw_strength)"
   ],answer:1,
   explain:"Final signal_strength = min(1.0, raw_strength / 15.0) — cap sigmoid-like a ~20 articles."},

  // ---- SIGNAL & GRADES ----
  {cat:2,val:200,
   q:"Quel grade est automatiquement assigne si Navi dit PIEGE ?",
   choices:["D","F","C","PASS"],answer:1,
   explain:"Grade F = override automatique quand Navi detecte un piege."},
  {cat:2,val:400,
   q:"Grade A + Navi GO + velocity >= 3 declenche quelle combinaison ?",
   choices:[
     "BUY MODERATE, urgence SOON",
     "BUY STRONG, urgence NOW",
     "BUY STRONG, urgence SOON",
     "BUY WEAK, urgence PATIENT"
   ],answer:1,
   explain:"La meilleure combinaison : BUY STRONG avec urgence NOW."},
  {cat:2,val:600,
   q:"Quelle condition transforme un Grade B en BUY WEAK au lieu de WATCH ?",
   choices:[
     "news_signal > 50% et velocity >= 3",
     "news_signal > 30% et Navi != INCERTAIN",
     "confidence > 0.8 et edge > 0.12",
     "velocity >= 5 et Navi = GO"
   ],answer:1,
   explain:"Grade B + news_signal > 30% + Navi != INCERTAIN = BUY WEAK, PATIENT."},
  {cat:2,val:800,
   q:"Quels sont les 3 niveaux d'urgence possibles pour un trade BUY ?",
   choices:[
     "IMMEDIATE, SOON, LATER",
     "NOW, SOON, PATIENT",
     "URGENT, NORMAL, LOW",
     "NOW, WAIT, SKIP"
   ],answer:1,
   explain:"Urgences : NOW (best case), SOON, PATIENT (most conservative)."},
  {cat:2,val:1000,
   q:"Quelles sont les 3 conditions exactes pour obtenir un Grade A ?",
   choices:[
     "|edge| > 0.15, confidence > 0.7, Navi = GO",
     "|edge| > 0.20, confidence > 0.8, velocity >= 3",
     "|edge| > 0.10, confidence > 0.6, Navi = GO",
     "|edge| > 0.15, confidence > 0.5, news_signal > 50%"
   ],answer:0,
   explain:"Grade A = |edge| > 0.15 AND confidence > 0.7 AND Navi verdict = GO."},

  // ---- KELLY SIZING ----
  {cat:3,val:200,
   q:"Quelle fraction du Kelly complet est utilisee dans le sizing ?",
   choices:["Half Kelly (1/2)","Quarter Kelly (1/4)","Eighth Kelly (1/8)","Full Kelly"],answer:1,
   explain:"quarter_kelly = kelly_full / 4.0 — gestion de risque conservative."},
  {cat:3,val:400,
   q:"Quel est le cap maximum du quarter Kelly ?",
   choices:["10%","15%","20%","25%"],answer:3,
   explain:"min(0.25, quarter_kelly) — jamais plus de 25% du budget d'un slot."},
  {cat:3,val:600,
   q:"Quelle est la formule du Full Kelly ?",
   choices:[
     "edge * market_price",
     "edge / (1 - market_price)",
     "edge / market_price",
     "(edge - market_price) / edge"
   ],answer:1,
   explain:"kelly_full = edge.edge / (1.0 - market_price). Denominateur = implied odds."},
  {cat:3,val:800,
   q:"Combien de positions ouvertes maximum simultanement ?",
   choices:["3","4","5","10"],answer:2,
   explain:"MAX_OPEN_POSITIONS = 5 dans config.py."},
  {cat:3,val:1000,
   q:"Comment est calcule le budget_per_slot ?",
   choices:[
     "TOTAL_BUDGET / MAX_OPEN_POSITIONS",
     "balance / max(1, MAX_OPEN_POSITIONS - open_positions)",
     "balance / open_positions",
     "balance * kelly * confidence"
   ],answer:1,
   explain:"budget_per_slot = balance / max(1, MAX_OPEN_POSITIONS - open_positions). Slots restants, pas total."},

  // ---- PIPELINE V4 ----
  {cat:4,val:200,
   q:"Quel est le poids de l'edge dans le composite score v4 ?",
   choices:["20%","30%","35%","40%"],answer:3,
   explain:"V4_EDGE_WEIGHT = 0.40 — l'edge est le facteur dominant en v4."},
  {cat:4,val:400,
   q:"Combien de marches sont fetches par scan ?",
   choices:["50","100","200","500"],answer:2,
   explain:"MARKETS_TO_FETCH = 200 dans config.py."},
  {cat:4,val:600,
   q:"Comment edge_normalized est-il calcule pour le composite ?",
   choices:[
     "edge_score * 100",
     "max(0, min(100, edge_score * 200))",
     "max(0, min(100, 50 + edge_score * 100))",
     "min(100, abs(edge_score) * 150)"
   ],answer:2,
   explain:"edge_normalized = max(0, min(100, 50 + edge_score * 100)). Centre a 50, scale x100."},
  {cat:4,val:800,
   q:"Quelles sont les 3 strategies du scanner ?",
   choices:[
     "momentum, volume, arbitrage",
     "near_resolution, spread_arb, momentum",
     "edge, news, composite",
     "quick, deep, full"
   ],answer:1,
   explain:"3 strategies : near_resolution, spread_arb, momentum."},
  {cat:4,val:1000,
   q:"Quel etait le poids du MAPEM en v3 vs v4 ?",
   choices:[
     "v3: 50%, v4: 20%",
     "v3: 65%, v4: 15%",
     "v3: 70%, v4: 10%",
     "v3: 55%, v4: 25%"
   ],answer:1,
   explain:"v3 : MAPEM_WEIGHT = 0.65 (dominant). v4 : V4_MAPEM_WEIGHT = 0.15 (l'edge prend le relais)."},

  // ---- BUG HUNTERS ----
  {cat:5,val:200,
   q:"Sous quelle forme Perigon retournait le sentiment (bug #1) ?",
   choices:[
     "Un string : 'positive'",
     "Un float entre -1 et 1",
     "Un dict {positive, negative, neutral} avec scores float",
     "Un array de labels"
   ],answer:2,
   explain:"Bug : le code attendait un string, mais Perigon renvoyait un dict avec des scores float."},
  {cat:5,val:400,
   q:"Combien de mots-cles maximum apres filtrage des stop words ?",
   choices:["3","4","6","10"],answer:2,
   explain:"Query limitee a 6 keywords apres suppression des stop words."},
  {cat:5,val:600,
   q:"Quel est le fallback ultime si Perigon echoue ?",
   choices:["Google News","Bing News","DuckDuckGo","Reddit"],answer:2,
   explain:"Chaine : Perigon (primaire) -> DuckDuckGo (fallback ultime via scrape HTML)."},
  {cat:5,val:800,
   q:"Quel sentiment DDG attribue-t-il par defaut aux articles ?",
   choices:["positive","negative","neutral","unknown"],answer:2,
   explain:"DDG ne fournit pas de sentiment -> default 'neutral' pour tous les articles."},
  {cat:5,val:1000,
   q:"Comment _normalize_query() empeche-t-elle les cache mismatches ?",
   choices:[
     "Hash MD5 de la query brute",
     "Lowercase + strip whitespace",
     "Extraction mots, suppression stop words, dedup, limite a 6 keywords",
     "URL-encoding de la query"
   ],answer:2,
   explain:"_normalize_query() : regex cleanup, lowercase, split, filtre stop words, garde 6 mots max, join."}
];

// ====================== STATE ======================
let score = 0, answered = 0;
const catScores = [0,0,0,0,0,0];
const catTotal = [0,0,0,0,0,0];
const done = new Set();

// ====================== SAFE DOM HELPERS ======================
function setText(el, text) {
  if (typeof el === 'string') el = document.getElementById(el);
  el.textContent = text;
}

function setCode(el, text) {
  // Render text that may contain `backtick` code spans as styled spans
  if (typeof el === 'string') el = document.getElementById(el);
  el.textContent = '';
  const parts = text.split(/`([^`]+)`/g);
  parts.forEach(function(part, i) {
    if (i % 2 === 1) {
      const code = document.createElement('code');
      code.textContent = part;
      el.appendChild(code);
    } else if (part) {
      el.appendChild(document.createTextNode(part));
    }
  });
}

// ====================== BOARD RENDER ======================
function buildBoard() {
  const board = document.getElementById('board');
  board.textContent = '';
  CATEGORIES.forEach(function(c) {
    const h = document.createElement('div');
    h.className = 'cat-header';
    h.textContent = c;
    board.appendChild(h);
  });
  [200,400,600,800,1000].forEach(function(val) {
    for (let ci = 0; ci < 6; ci++) {
      const cell = document.createElement('div');
      const key = ci + '-' + val;
      cell.className = 'cell' + (done.has(key) ? ' done' : '');
      cell.textContent = done.has(key) ? '' : '$' + val;
      cell.dataset.key = key;
      if (!done.has(key)) {
        (function(catIdx, value) {
          cell.onclick = function() { openQuestion(catIdx, value); };
        })(ci, val);
      }
      board.appendChild(cell);
    }
  });
}

// ====================== MODAL ======================
function openQuestion(cat, val) {
  const q = QUESTIONS.find(function(x) { return x.cat === cat && x.val === val; });
  if (!q) return;
  setText('m-cat', CATEGORIES[cat]);
  setText('m-val', '$' + val);
  // Parse question for backtick code spans
  setCode(document.getElementById('m-question'), q.q);
  setText('feedback', '');
  document.getElementById('feedback').className = '';
  document.getElementById('next-btn').style.display = 'none';

  const cDiv = document.getElementById('m-choices');
  cDiv.textContent = '';
  q.choices.forEach(function(c, i) {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.textContent = c;
    btn.onclick = function() { handleAnswer(q, i, cDiv); };
    cDiv.appendChild(btn);
  });

  document.getElementById('overlay').classList.add('active');
}

function handleAnswer(q, idx, cDiv) {
  const btns = cDiv.querySelectorAll('.choice-btn');
  btns.forEach(function(b) { b.disabled = true; });

  const correct = idx === q.answer;
  btns[idx].classList.add(correct ? 'correct' : 'wrong');
  if (!correct) {
    btns[q.answer].classList.add('reveal');
  }

  const fb = document.getElementById('feedback');
  if (correct) {
    score += q.val;
    catScores[q.cat] += q.val;
    fb.textContent = 'Correct ! +$' + q.val;
    fb.className = 'green';
  } else {
    fb.textContent = q.explain;
    fb.className = 'red';
  }
  catTotal[q.cat] += q.val;
  answered++;
  done.add(q.cat + '-' + q.val);

  setText('score-display', '$' + score);
  setText('q-counter', answered + '/30');
  document.getElementById('next-btn').style.display = 'inline-block';
}

function closeModal() {
  document.getElementById('overlay').classList.remove('active');
  buildBoard();
  if (answered >= 30) showFinal();
}

document.getElementById('next-btn').onclick = closeModal;
document.getElementById('replay-btn').onclick = function() { location.reload(); };

// ====================== FINAL ======================
function showFinal() {
  const totalPossible = (200+400+600+800+1000) * 6; // 18000
  const pct = Math.round(score / totalPossible * 100);

  let rank, color;
  if (pct >= 90) { rank = 'EDGE MASTER — Tu connais le pipeline mieux que le code lui-meme'; color = '#4ECDC4'; }
  else if (pct >= 70) { rank = 'SENIOR HUNTER — Solide maitrise du v4'; color = '#FF9EC6'; }
  else if (pct >= 50) { rank = 'APPRENTI TRADER — Les bases sont la, continue'; color = '#7B68EE'; }
  else if (pct >= 30) { rank = 'PAPER TRADER — Relis le code, il y a du boulot'; color = '#FFaa50'; }
  else { rank = 'REKT — Retourne lire edge.py et news_intel.py'; color = '#ff5050'; }

  setText('final-score', '$' + score + ' / $' + totalPossible);
  setText('final-sub', pct + '% — ' + answered + ' questions');

  const rankEl = document.getElementById('final-rank');
  rankEl.textContent = '';
  const rankSpan = document.createElement('span');
  rankSpan.style.color = color;
  rankSpan.textContent = rank;
  rankEl.appendChild(rankSpan);

  const bdEl = document.getElementById('breakdown');
  bdEl.textContent = '';
  CATEGORIES.forEach(function(c, i) {
    const cs = catScores[i], ct = catTotal[i];
    const p = ct > 0 ? Math.round(cs/ct*100) : 0;
    const bar = p >= 80 ? '##' : p >= 50 ? '#-' : '--';
    const line = document.createElement('div');
    line.textContent = '[' + bar + '] ' + c + ' : $' + cs + '/$' + ct + ' (' + p + '%)';
    bdEl.appendChild(line);
  });

  document.getElementById('final').classList.add('active');
}

// ====================== CANVAS BACKGROUND ======================
(function(){
  var c = document.getElementById('bg');
  var ctx = c.getContext('2d');
  var W, H;

  function resize() {
    W = c.width = window.innerWidth;
    H = c.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  // Particles
  var N = 60;
  var particles = [];
  var hues = [340, 175, 250, 195];
  for (var i = 0; i < N; i++) {
    particles.push({
      x: Math.random() * 2000,
      y: Math.random() * 2000,
      r: 3 + Math.random() * 18,
      vx: (Math.random() - 0.5) * 0.4,
      vy: (Math.random() - 0.5) * 0.4,
      type: Math.random() < 0.5 ? 'sphere' : 'hex',
      hue: hues[Math.floor(Math.random() * 4)],
      alpha: 0.12 + Math.random() * 0.18,
      phase: Math.random() * Math.PI * 2
    });
  }

  function drawSphere(x, y, r, hue, alpha) {
    var g = ctx.createRadialGradient(x - r*0.3, y - r*0.3, r*0.1, x, y, r);
    g.addColorStop(0, 'hsla('+hue+',80%,80%,'+alpha*1.5+')');
    g.addColorStop(0.5, 'hsla('+hue+',70%,55%,'+alpha+')');
    g.addColorStop(1, 'hsla('+hue+',60%,30%,'+alpha*0.3+')');
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fillStyle = g;
    ctx.fill();
  }

  function drawHex(x, y, r, hue, alpha, rot) {
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(rot);
    ctx.beginPath();
    for (var i = 0; i < 6; i++) {
      var a = Math.PI / 3 * i;
      var px = Math.cos(a) * r, py = Math.sin(a) * r;
      i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
    }
    ctx.closePath();
    ctx.fillStyle = 'hsla('+hue+',60%,55%,'+alpha*0.5+')';
    ctx.fill();
    ctx.strokeStyle = 'hsla('+hue+',70%,70%,'+alpha*0.8+')';
    ctx.lineWidth = 1;
    ctx.stroke();
    ctx.restore();
  }

  // Glow orbs
  var orbs = [
    {x:0.2,y:0.3,r:220,hue:340},
    {x:0.8,y:0.6,r:180,hue:175},
    {x:0.5,y:0.8,r:200,hue:250}
  ];

  var t = 0;
  function frame() {
    t += 0.006;
    ctx.fillStyle = 'rgba(10,10,26,0.92)';
    ctx.fillRect(0, 0, W, H);

    // Glow orbs
    for (var oi = 0; oi < orbs.length; oi++) {
      var o = orbs[oi];
      var g = ctx.createRadialGradient(o.x*W, o.y*H, 0, o.x*W, o.y*H, o.r);
      g.addColorStop(0, 'hsla('+o.hue+',70%,50%,0.06)');
      g.addColorStop(1, 'transparent');
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, W, H);
    }

    // Particles
    for (var pi = 0; pi < particles.length; pi++) {
      var p = particles[pi];
      p.x += p.vx;
      p.y += p.vy;
      if (p.x < -30) p.x = W + 30;
      if (p.x > W + 30) p.x = -30;
      if (p.y < -30) p.y = H + 30;
      if (p.y > H + 30) p.y = -30;

      var pulse = 1 + Math.sin(t * 2 + p.phase) * 0.15;
      var r = p.r * pulse;
      var a = p.alpha * (0.8 + Math.sin(t + p.phase) * 0.2);

      if (p.type === 'sphere') {
        drawSphere(p.x, p.y, r, p.hue, a);
      } else {
        drawHex(p.x, p.y, r, p.hue, a, t * 0.3 + p.phase);
      }
    }

    // Subtle scanlines
    ctx.fillStyle = 'rgba(255,255,255,0.008)';
    for (var y = 0; y < H; y += 4) {
      ctx.fillRect(0, y, W, 1);
    }

    requestAnimationFrame(frame);
  }
  frame();
})();

// ====================== INIT ======================
buildBoard();
</script>
